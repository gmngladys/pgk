<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PGK Equator Tour 2026/2027 — Event Registration</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #1a3d2b;
    --gold: #c9a84c;
    --cream: #f5f0e8;
    --red: #8b1a1a;
    --dark: #0f1f16;
    --muted: #7a8f82;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--dark);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(26,61,43,0.6) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%);
  }
  .page-wrapper { max-width: 760px; margin: 0 auto; padding: 48px 24px 80px; }
  .header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.8s ease both; }
  .header-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 6px 18px;
    margin-bottom: 20px;
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.2rem);
    font-weight: 900;
    line-height: 1.1;
    color: #fff;
    margin-bottom: 8px;
  }
  .header h1 span { color: var(--gold); }
  .header p { color: var(--muted); font-size: 14px; letter-spacing: 1px; text-transform: uppercase; }
  .divider {
    width: 60px; height: 2px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto;
  }
  .form-card {
    background: rgba(26, 61, 43, 0.25);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 2px;
    padding: 40px;
    animation: fadeUp 0.9s ease 0.2s both;
  }
  .form-section-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .field-group { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  .field { display: flex; flex-direction: column; gap: 7px; }
  label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  input[type="text"], input[type="email"], input[type="tel"] {
    background: rgba(15,31,22,0.8);
    border: 1px solid rgba(201,168,76,0.25);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 12px 16px;
    outline: none;
    border-radius: 1px;
    transition: border-color 0.2s;
  }
  input:focus { border-color: var(--gold); }
  input::placeholder { color: rgba(122,143,130,0.5); }
  input.invalid { border-color: var(--red) !important; }
  .events-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 32px 0 20px;
  }
  .events-grid { display: flex; flex-direction: column; gap: 10px; }
  .event-option { position: relative; cursor: pointer; }
  .event-option input[type="radio"] { position: absolute; opacity: 0; width: 0; }
  .event-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border: 1px solid rgba(201,168,76,0.15);
    background: rgba(15,31,22,0.5);
    cursor: pointer;
    transition: all 0.2s;
    gap: 12px;
  }
  .event-option input:checked + .event-label { border-color: var(--gold); background: rgba(201,168,76,0.1); }
  .event-option:not(.full):hover .event-label { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.05); }
  .event-option.full { cursor: not-allowed; opacity: 0.45; }
  .event-option.full .event-label { cursor: not-allowed; }
  .event-info { flex: 1; }
  .event-name { font-family: 'Playfair Display', serif; font-size: 15px; color: #fff; margin-bottom: 3px; }
  .event-date { font-size: 12px; color: var(--muted); letter-spacing: 0.5px; }
  .event-slots { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; min-width: 80px; }
  .slots-dots { display: flex; gap: 5px; }
  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1px solid rgba(201,168,76,0.4);
    background: transparent;
  }
  .dot.filled { background: var(--gold); border-color: var(--gold); }
  .dot.full-dot { border-color: var(--red); background: var(--red); }
  .slots-text { font-size: 10px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .full-badge {
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    border: 1px solid var(--red);
    padding: 2px 7px;
  }
  .radio-indicator {
    width: 16px; height: 16px;
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 50%;
    flex-shrink: 0;
    position: relative;
  }
  .event-option input:checked + .event-label .radio-indicator { border-color: var(--gold); }
  .event-option input:checked + .event-label .radio-indicator::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 7px; height: 7px;
    background: var(--gold);
    border-radius: 50%;
  }
  .tee-time-selector {
    display: none;
    padding: 12px 18px;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.2);
    border-top: none;
    gap: 12px;
    align-items: center;
  }
  .tee-time-selector.visible { display: flex; }
  .tee-time-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    flex-shrink: 0;
  }
  .tee-btns { display: flex; gap: 8px; }
  .tee-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--cream);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 7px 20px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .tee-btn:hover { border-color: var(--gold); background: rgba(201,168,76,0.08); }
  .tee-btn.selected { background: var(--gold); color: var(--dark); border-color: var(--gold); font-weight: 600; }
  .tee-btn.invalid-tee { border-color: var(--red) !important; }
  .submit-area { margin-top: 36px; text-align: center; }
  .submit-btn {
    background: var(--gold);
    color: var(--dark);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 16px 48px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .submit-btn:hover { background: #e0bc6a; transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .error-msg { color: #e07070; font-size: 12px; letter-spacing: 1px; margin-top: 12px; display: none; text-align: center; }
  .loading-overlay {
    text-align: center;
    padding: 40px 20px;
    color: var(--muted);
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
    vertical-align: middle;
  }
  .success-card { display: none; text-align: center; padding: 60px 40px; animation: fadeUp 0.6s ease both; }
  .success-icon { font-size: 48px; margin-bottom: 20px; }
  .success-card h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--gold); margin-bottom: 12px; }
  .success-card p { color: var(--muted); font-size: 14px; line-height: 1.7; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp   { from { opacity: 0; transform: translateY(20px);  } to { opacity: 1; transform: translateY(0); } }
  @keyframes spin     { to { transform: rotate(360deg); } }
  @media (max-width: 560px) {
    .form-card { padding: 28px 20px; }
    .field-group { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page-wrapper">
  <div class="header">
    <div class="header-badge">Professional Golfers of Kenya</div>
    <h1>PGK <span>Equator</span> Tour</h1>
    <p>Event Schedule 2026 / 2027</p>
    <div class="divider"></div>
  </div>

  <div class="form-card" id="formCard">
    <div id="loadingOverlay" class="loading-overlay">
      <span class="spinner"></span> Loading event availability...
    </div>
    <div id="formContent" style="display:none">
      <div class="form-section-title">Your Details</div>
      <div class="field-group">
        <div class="field">
          <label for="fname">Full Name</label>
          <input type="text" id="fname" placeholder="John Kamau" />
        </div>
        <div class="field">
          <label for="company">Company</label>
          <input type="text" id="company" placeholder="Your Company" />
        </div>
      </div>
      <div class="field-group">
        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@company.com" />
        </div>
        <div class="field">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+254 7XX XXX XXX" />
        </div>
      </div>
      <div class="events-title">Select Your Event</div>
      <div class="events-grid" id="eventsGrid"></div>
      <div class="submit-area">
        <p class="error-msg" id="errorMsg"></p>
        <button class="submit-btn" id="submitBtn">Register Now</button>
      </div>
    </div>
  </div>

  <div class="success-card" id="successCard">
    <div class="success-icon">⛳</div>
    <h2>You're Registered!</h2>
    <p id="successMsg"></p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAidgiKd6FTH6-_Yx2jd3_NHbdeBtWbfos",
    authDomain: "pgk-golf.firebaseapp.com",
    projectId: "pgk-golf",
    storageBucket: "pgk-golf.firebasestorage.app",
    messagingSenderId: "240187419231",
    appId: "1:240187419231:web:b228e64db0ba576922c9ea"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const EVENTS = [
    { id: 1,  name: "Vet Lab Sports Club",               date: "23rd - 26th April 2026" },
    { id: 2,  name: "Ruiru Sports Club",                 date: "14th - 17th May 2026" },
    { id: 3,  name: "Thika Sports Club",                 date: "21st - 24th May 2026" },
    { id: 4,  name: "Limuru Country Club",               date: "18th - 21st June 2026" },
    { id: 5,  name: "Nyali Golf Club",                   date: "2nd - 5th July 2026" },
    { id: 6,  name: "Nakuru Golf Club",                  date: "6th - 9th August 2026" },
    { id: 7,  name: "Sigona Golf Club",                  date: "27th - 30th August 2026" },
    { id: 8,  name: "Royal Nairobi Golf Club",           date: "10th - 13th September 2026" },
    { id: 9,  name: "Great Rift Valley Lodge",           date: "24th - 27th September 2026" },
    { id: 10, name: "Mt. Kipipiri Golf & Resort",        date: "8th - 11th October 2026" },
    { id: 11, name: "Diamond Leisure Lodge Golf Resort", date: "26th - 29th November 2026" },
  ];

  const MAX_SLOTS = 4;
  let slotCounts = {};
  let formReady = false;
  let selectedTeeTime = null;

  window.selectTee = function(eventId, tee, btn) {
    selectedTeeTime = tee;
    document.querySelectorAll(`#tee-${eventId} .tee-btn`).forEach(b => {
      b.classList.remove('selected', 'invalid-tee');
    });
    btn.classList.add('selected');
  };

  const q = query(collection(db, "registrations"));
  onSnapshot(q, (snapshot) => {
    slotCounts = {};
    snapshot.forEach(doc => {
      const data = doc.data();
      if (data.eventId) {
        slotCounts[data.eventId] = (slotCounts[data.eventId] || 0) + 1;
      }
    });
    renderEvents();
    if (!formReady) {
      document.getElementById('loadingOverlay').style.display = 'none';
      document.getElementById('formContent').style.display = 'block';
      formReady = true;
    }
  });

  function renderEvents() {
    const grid = document.getElementById('eventsGrid');
    const selectedValue = document.querySelector('input[name="event"]:checked')?.value;
    grid.innerHTML = '';
    EVENTS.forEach(ev => {
      const count = slotCounts[ev.id] || 0;
      const isFull = count >= MAX_SLOTS;
      let dotsHTML = '';
      for (let i = 0; i < MAX_SLOTS; i++) {
        dotsHTML += `<div class="dot ${i < count ? (isFull ? 'full-dot' : 'filled') : ''}"></div>`;
      }
      const slotsRemaining = MAX_SLOTS - count;
      const wrapper = document.createElement('div');
      wrapper.className = 'event-option' + (isFull ? ' full' : '');
      const isSelected = selectedValue == ev.id;
      wrapper.innerHTML = `
        <input type="radio" name="event" id="ev${ev.id}" value="${ev.id}" ${isFull ? 'disabled' : ''} ${isSelected ? 'checked' : ''}>
        <label class="event-label" for="ev${ev.id}">
          <div class="radio-indicator"></div>
          <div class="event-info">
            <div class="event-name">${ev.name}</div>
            <div class="event-date">${ev.date}</div>
          </div>
          <div class="event-slots">
            <div class="slots-dots">${dotsHTML}</div>
            ${isFull ? '<div class="full-badge">Full</div>' : `<div class="slots-text">${slotsRemaining} slot${slotsRemaining !== 1 ? 's' : ''} left</div>`}
          </div>
        </label>
        ${!isFull ? `
        <div class="tee-time-selector ${isSelected ? 'visible' : ''}" id="tee-${ev.id}">
          <span class="tee-time-label">Tee Time</span>
          <div class="tee-btns">
            <button type="button" class="tee-btn" data-tee="AM" onclick="selectTee(${ev.id}, 'AM', this)">AM</button>
            <button type="button" class="tee-btn" data-tee="PM" onclick="selectTee(${ev.id}, 'PM', this)">PM</button>
          </div>
        </div>` : ''}`;

      // Show/hide tee selector on radio change
      const radio = wrapper.querySelector('input[type="radio"]');
      if (radio) {
        radio.addEventListener('change', () => {
          document.querySelectorAll('.tee-time-selector').forEach(el => el.classList.remove('visible'));
          document.getElementById(`tee-${ev.id}`)?.classList.add('visible');
          selectedTeeTime = null;
          document.querySelectorAll('.tee-btn').forEach(b => b.classList.remove('selected', 'invalid-tee'));
        });
      }

      grid.appendChild(wrapper);
    });
  }

  document.getElementById('submitBtn').addEventListener('click', async () => {
    const name    = document.getElementById('fname').value.trim();
    const company = document.getElementById('company').value.trim();
    const email   = document.getElementById('email').value.trim();
    const phone   = document.getElementById('phone').value.trim();
    const selected = document.querySelector('input[name="event"]:checked');
    const errorEl  = document.getElementById('errorMsg');

    ['fname','company','email','phone'].forEach(id => document.getElementById(id).classList.remove('invalid'));
    errorEl.style.display = 'none';

    let valid = true;
    if (!name)    { document.getElementById('fname').classList.add('invalid');   valid = false; }
    if (!company) { document.getElementById('company').classList.add('invalid'); valid = false; }
    if (!email || !/\S+@\S+\.\S+/.test(email)) { document.getElementById('email').classList.add('invalid'); valid = false; }
    if (!phone)   { document.getElementById('phone').classList.add('invalid');   valid = false; }
    if (!selected) valid = false;

    if (!valid) {
      errorEl.textContent = 'Please fill in all fields and select an event.';
      errorEl.style.display = 'block';
      return;
    }

    if (!selectedTeeTime) {
      errorEl.textContent = 'Please select a tee time (AM or PM) for your event.';
      errorEl.style.display = 'block';
      const eventId2 = parseInt(selected.value);
      document.querySelectorAll(`#tee-${eventId2} .tee-btn`).forEach(b => b.classList.add('invalid-tee'));
      return;
    }

    const eventId = parseInt(selected.value);
    const event = EVENTS.find(e => e.id === eventId);

    if ((slotCounts[eventId] || 0) >= MAX_SLOTS) {
      errorEl.textContent = 'Sorry, this event just filled up. Please choose another.';
      errorEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Submitting...';

    try {
      await addDoc(collection(db, "registrations"), {
        name, company, email, phone, eventId,
        eventName: event.name,
        teeTime: selectedTeeTime,
        timestamp: new Date().toISOString()
      });
      document.getElementById('formCard').style.display = 'none';
      document.getElementById('successCard').style.display = 'block';
      document.getElementById('successMsg').innerHTML =
        `Thank you, <strong style="color:var(--gold)">${name}</strong>.<br>
         Your spot at <strong style="color:var(--gold)">${event.name}</strong> has been reserved.<br>
         Tee time preference: <strong style="color:var(--gold)">${selectedTeeTime}</strong><br><br>
         <span style="font-size:12px">We will reach out to you at ${email} with further details.</span>`;
    } catch (err) {
      errorEl.textContent = 'Something went wrong. Please try again.';
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Register Now';
    }
  });
</script>
</body>
</html>
